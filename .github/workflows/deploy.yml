name: Deploy Portfolio to EC2

on:
  push:
    branches:
      - main 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code from repository
        uses: actions/checkout@v3

      - name: login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: package and push image to Docker Hub
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/jabick:latest

      # NEW STEP: Copy Nginx configuration and Docker Compose to EC2
      - name: Copy configuration to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,nginx/"
          target: "/home/${{ secrets.EC2_USERNAME }}/portfolio"

      # FIXED STEP: Run with docker-compose instead of docker run
      - name: login to EC2 and update web
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USERNAME }}/portfolio
            
            # pull the latest image
            docker compose pull
            
            # restart the entire system (automatically replace the old container)
            docker compose up -d
            
            # clean up the system
            docker system prune -af